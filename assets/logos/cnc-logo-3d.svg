<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- 3D metallic gradient - Red -->
    <linearGradient id="redMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333"/>
      <stop offset="30%" style="stop-color:#cc0000"/>
      <stop offset="50%" style="stop-color:#990000"/>
      <stop offset="70%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#660000"/>
    </linearGradient>
    <!-- 3D metallic gradient - Blue -->
    <linearGradient id="blueMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff"/>
      <stop offset="30%" style="stop-color:#1155cc"/>
      <stop offset="50%" style="stop-color:#003399"/>
      <stop offset="70%" style="stop-color:#1155cc"/>
      <stop offset="100%" style="stop-color:#002266"/>
    </linearGradient>
    <!-- White/Silver metallic -->
    <linearGradient id="whiteMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#e8e8e8"/>
      <stop offset="50%" style="stop-color:#cccccc"/>
      <stop offset="70%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#aaaaaa"/>
    </linearGradient>
    <!-- Chrome highlight -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.2)"/>
    </linearGradient>
    <!-- Drop shadow for 3D depth -->
    <filter id="shadow3d" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Subtle outer glow -->
    <filter id="outerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#cc0000" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === CNC === (Red, White, Blue - one letter each) -->
  <!-- 3D offset layer (dark) -->
  <text x="452" y="118" text-anchor="middle" font-family="'Impact','Arial Black','Bebas Neue',sans-serif" font-size="120" font-weight="900" letter-spacing="15" fill="#330000" opacity="0.6">CNC</text>
  
  <!-- Main CNC text -->
  <g filter="url(#shadow3d)">
    <!-- C - Red -->
    <text x="340" y="115" text-anchor="middle" font-family="'Impact','Arial Black','Bebas Neue',sans-serif" font-size="120" font-weight="900" fill="url(#redMetal)">C</text>
    <!-- N - White -->
    <text x="420" y="115" text-anchor="middle" font-family="'Impact','Arial Black','Bebas Neue',sans-serif" font-size="120" font-weight="900" fill="url(#whiteMetal)">N</text>
    <!-- C - Blue -->
    <text x="505" y="115" text-anchor="middle" font-family="'Impact','Arial Black','Bebas Neue',sans-serif" font-size="120" font-weight="900" fill="url(#blueMetal)">C</text>
  </g>

  <!-- Decorative line under CNC -->
  <rect x="280" y="130" width="300" height="3" rx="1.5" fill="url(#redMetal)" opacity="0.8"/>
  <rect x="310" y="136" width="240" height="1.5" rx="0.75" fill="url(#blueMetal)" opacity="0.6"/>

  <!-- === PRECISION MACHINES === -->
  <text x="452" y="182" text-anchor="middle" font-family="'Impact','Arial Black','Bebas Neue',sans-serif" font-size="48" font-weight="900" letter-spacing="10" fill="url(#whiteMetal)" filter="url(#shadow3d)">PRECISION MACHINES</text>

  <!-- === INTL. LLC === -->
  <text x="452" y="220" text-anchor="middle" font-family="'Impact','Arial Black','Bebas Neue',sans-serif" font-size="30" font-weight="700" letter-spacing="12" fill="url(#redMetal)" filter="url(#shadow3d)">INTL. LLC</text>

  <!-- Decorative stars -->
  <text x="330" y="222" text-anchor="middle" font-size="16" fill="url(#blueMetal)">★</text>
  <text x="575" y="222" text-anchor="middle" font-size="16" fill="url(#blueMetal)">★</text>

  <!-- Bottom tagline -->
  <rect x="200" y="240" width="500" height="1" fill="url(#whiteMetal)" opacity="0.3"/>
  <text x="452" y="270" text-anchor="middle" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="14" font-weight="400" letter-spacing="6" fill="#999999">EL PASO, TX  •  NEW MEXICO  •  NORTHERN MEXICO</text>

  <!-- Established badge -->
  <text x="452" y="300" text-anchor="middle" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="12" font-weight="600" letter-spacing="4" fill="#666666">EST. 2000  •  35+ YEARS EXPERIENCE</text>
</svg>
